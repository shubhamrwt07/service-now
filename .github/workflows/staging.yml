# ============================================================
# STAGING WORKFLOW — Automatic Deploy on staging branch push
# ============================================================
# Ye workflow tab trigger hota hai jab:
#   - staging branch pe koi code push hota hai
#
# Flow:
#   Code Push → Build → Deploy to idle env → Health Check → Switch
#
# Staging = testing environment (production jaisa but real users nahi)
# Yahan pe test karo phir production pe push karo
# ============================================================

name: 🔵🟢 Staging Deploy

on:
  push:
    branches:
      - staging    # Sirf "staging" branch pe push hone pe trigger

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted    # Tumhara apna server runner hai

    # ---- Environment Variables ----
    # ye sab GitHub Secrets se aate hain
    # Settings → Secrets → New repository secret
    env:
      DEPLOY_ENV: staging

    steps:
      # --------------------------------------------------------
      # STEP 1: Code checkout
      # --------------------------------------------------------
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        # Latest code server pe copy hoga

      # --------------------------------------------------------
      # STEP 2: Backend .env copy karo
      # --------------------------------------------------------
      # .env Git mein nahi hoti (security)
      # /home/shubhamrwt/service-now/secrets/backend.env = permanent location
      # Runner ka working dir alag hota hai, isliye hardcoded permanent path use karo
      # $GITHUB_WORKSPACE = runner ka actual checkout path
      - name: 🔑 Setup Backend Environment
        run: |
          # Permanent secrets location se copy karo
          # Ye path kabhi nahi badlega — runner directory change ho toh bhi ye safe hai
          SECRETS_ENV="/home/shubhamrwt/service-now/secrets/backend.env"
          
          if [ ! -f "${SECRETS_ENV}" ]; then
            echo "❌ Secrets file not found: ${SECRETS_ENV}"
            echo "Run: cp /path/to/.env /home/shubhamrwt/service-now/secrets/backend.env"
            exit 1
          fi
          
          cp "${SECRETS_ENV}" "${GITHUB_WORKSPACE}/backend/.env"
          echo "✅ Backend .env configured from ${SECRETS_ENV}"

      # --------------------------------------------------------
      # STEP 3: Script permissions
      # --------------------------------------------------------
      - name: 🔧 Set Script Permissions
        run: |
          chmod +x deploy.sh
          chmod +x health-check.sh
          chmod +x nginx/switch.sh
          echo "✅ Scripts are executable"

      # --------------------------------------------------------
      # STEP 4: Blue-Green Deploy!
      # --------------------------------------------------------
      - name: 🚀 Blue-Green Deploy
        run: |
          ./deploy.sh
        # deploy.sh poora kaam karta hai:
        # - Current env detect karo
        # - Idle pe deploy karo
        # - Health check karo
        # - Traffic switch karo

      # --------------------------------------------------------
      # STEP 5: Verify deployment
      # --------------------------------------------------------
      - name: ✅ Verify Deployment
        run: |
          echo "=== Running Containers ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          
          # ---- Detect which environment was just deployed ----
          # Blue containers chal rahe hain? → port 5001
          # Green containers chal rahe hain? → port 5002
          if docker ps --format '{{.Names}}' | grep -q 'backend-blue'; then
            ACTIVE_PORT=5001
            ACTIVE_ENV=blue
          elif docker ps --format '{{.Names}}' | grep -q 'backend-green'; then
            ACTIVE_PORT=5002
            ACTIVE_ENV=green
          else
            echo "❌ No backend container found!"
            exit 1
          fi
          
          echo ""
          echo "=== Active Environment ==="
          echo "Environment: ${ACTIVE_ENV} (port ${ACTIVE_PORT})"
          
          # ---- Direct backend health check (port se, nginx bypass) ----
          # http://localhost/health nahi — wahan nginx chahiye
          # Seedha container port pe check karo
          echo ""
          echo "=== Backend Health Check (direct port) ==="
          HEALTH_RESPONSE=$(curl -sf --max-time 10 http://localhost:${ACTIVE_PORT}/health || echo "")
          
          if [ -z "${HEALTH_RESPONSE}" ]; then
            echo "❌ Backend health check failed on port ${ACTIVE_PORT}"
            exit 1
          fi
          
          echo "${HEALTH_RESPONSE}" | python3 -m json.tool
          echo "✅ Backend is healthy!"
          
          echo ""
          echo "=== Summary ==="
          echo "✅ Deployment SUCCESSFUL — ${ACTIVE_ENV} environment is live"
          echo "   Backend:  http://localhost:${ACTIVE_PORT}"
          if [ "${ACTIVE_ENV}" == "blue" ]; then
            echo "   Frontend: http://localhost:3001"
          else
            echo "   Frontend: http://localhost:3002"
          fi

      # --------------------------------------------------------
      # STEP 6: Slack/Email notification (optional)
      # --------------------------------------------------------
      - name: 📣 Notify on Success
        if: success()
        run: |
          echo "✅ Staging deployment successful at $(date)"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Commit: ${GITHUB_SHA:0:7}"
          # Production mein: Slack webhook ya email bhejo

      - name: 🔴 Notify on Failure
        if: failure()
        run: |
          echo "❌ Staging deployment FAILED at $(date)"
          echo "Previous environment is still serving traffic safely"
          # Production mein: Alert team via Slack/PagerDuty
