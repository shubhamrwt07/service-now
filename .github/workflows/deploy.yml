name: service-now CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Copy Backend .env
        run: cp /home/shubhamrwt/service-now/backend/.env backend/.env  
        
      - name: Build & Deploy
        run: |
          docker compose -f docker-compose.yml down
          docker compose -f docker-compose.yml up -d --build

      - name: Verify
        run: docker ps