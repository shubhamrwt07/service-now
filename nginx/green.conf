# ============================================================
# NGINX — GREEN ENVIRONMENT CONFIG
# ============================================================
# Bilkul Blue jaisa — sirf ports alag hain:
# Frontend → localhost:3002 (Blue ka 3001 tha)
# Backend  → localhost:5002 (Blue ka 5001 tha)
#
# switch.sh is file ko active.conf ke roop mein link karta hai
# ============================================================

upstream backend_green {
    server localhost:5002;    # Green backend
    keepalive 32;
}

upstream frontend_green {
    server localhost:3002;    # Green frontend
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Deploy-Color "green";    # Response mein "green" dikhega

    # API → Green Backend
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend_green;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout    90s;
        proxy_send_timeout    30s;
    }

    location /health {
        proxy_pass http://backend_green;
        proxy_set_header Host $host;
    }

    # Frontend → Green Frontend
    location / {
        proxy_pass http://frontend_green;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
