# ============================================================
# NGINX — BLUE ENVIRONMENT CONFIG
# ============================================================
# Jab Blue LIVE ho, ye config active.conf ke roop mein link hoti hai
# Nginx is config ko load karta hai → traffic Blue containers pe jaata hai
#
# Blue containers:
#   Frontend → localhost:3001
#   Backend  → localhost:5001
# ============================================================

# -------------------------------------------------------
# UPSTREAM — Backend server pool (Blue)
# -------------------------------------------------------
# "upstream" = backend servers ka group
# Agar multiple backend containers hon toh yahan sab list karo
# Nginx load balance karega automatically
upstream backend_blue {
    server localhost:5001;    # Blue backend container
    # Future: agar 2 backend containers ho:
    # server localhost:5003;
    keepalive 32;             # 32 connections pool mein rakho (performance)
}

# -------------------------------------------------------
# UPSTREAM — Frontend server (Blue)
# -------------------------------------------------------
upstream frontend_blue {
    server localhost:3001;    # Blue frontend container (nginx serving static files)
    keepalive 16;
}

# -------------------------------------------------------
# HTTP SERVER — Port 80
# -------------------------------------------------------
server {
    listen 80;
    server_name _;    # Koi bhi domain/IP accept karo

    # Security headers — production mein zaroori
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Deploy-Color "blue";    # Response mein color dikhao (debugging)

    # ---------------------------------------------------
    # API Routes → Backend Blue
    # ---------------------------------------------------
    # /api/* ya /health → backend container pe bhejo
    location /api/ {
        # Rate limit apply karo
        limit_req zone=api_limit burst=20 nodelay;

        # Proxy to Blue backend
        proxy_pass http://backend_blue;

        # Headers — backend ko batao original IP kaun hai
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 30s;    # Backend se connect hone ka max time
        proxy_read_timeout    90s;    # Backend response ka max wait time
        proxy_send_timeout    30s;
    }

    # Health endpoint bhi backend pe route karo
    location /health {
        proxy_pass http://backend_blue;
        proxy_set_header Host $host;
    }

    # ---------------------------------------------------
    # Frontend Routes → Frontend Blue
    # ---------------------------------------------------
    # Baaki sab traffic (/, /dashboard, /login) → frontend
    location / {
        proxy_pass http://frontend_blue;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket support (React dev server ke liye, optional)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
