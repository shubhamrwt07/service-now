# ============================================================
# NGINX — MAIN TRAFFIC ROUTER CONFIG
# ============================================================
# Ye nginx.conf production server pe lagta hai
# Users yahan se aate hain — nginx decide karta hai
# traffic Blue jaayega ya Green
#
# Architecture:
# User → Port 80 (nginx) → Blue (5001/3001) ya Green (5002/3002)
#
# Is config ko /etc/nginx/nginx.conf pe rakho server par
# ============================================================

# Worker processes = server ke CPU cores ki taadaad
# "auto" = nginx khud detect kar leta hai
worker_processes auto;

# Maximum open file connections per worker
events {
    worker_connections 1024;
}

http {
    # -------------------------------------------------------
    # Basic MIME Types
    # -------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------
    # Logging Format
    # -------------------------------------------------------
    # $remote_addr = User ka IP
    # $request = GET /api/data HTTP/1.1
    # $status = 200, 404, 500 etc
    # $upstream_addr = konse backend pe gaya (blue/green debug ke liye)
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent" upstream: $upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # -------------------------------------------------------
    # Performance Settings
    # -------------------------------------------------------
    sendfile on;           # OS-level file transfer (fast)
    tcp_nopush on;         # Packets batch karke bhejo
    keepalive_timeout 65;  # Connection 65 sec tak open rakho
    gzip on;               # Response compress karo

    # -------------------------------------------------------
    # Rate Limiting — DDoS protection
    # -------------------------------------------------------
    # Ek IP se zyada requests aayein toh limit karo
    # 10 requests/second per IP allow, 20 burst
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # -------------------------------------------------------
    # Include active environment config
    # -------------------------------------------------------
    # switch.sh is symlink ko badalta hai:
    # /etc/nginx/conf.d/active.conf → blue.conf ya green.conf
    # Ek line se poora traffic switch!
    include /etc/nginx/conf.d/active.conf;
}
