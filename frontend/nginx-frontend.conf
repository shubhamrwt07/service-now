# Ye nginx config sirf frontend container ke andar use hoga
# (Production ka main nginx alag hoga)

server {
    # Port 3005 pe listen karo (container ke andar)
    listen 3005;
    
    # Server name (container ke andar localhost hi hai)
    server_name localhost;
    
    # Root directory — yahan se static files serve honge
    root /usr/share/nginx/html;
    
    # Default file jo serve ho jab sirf "/" request aaye
    index index.html;

    # -------------------------------------------------------
    # SPA (Single Page Application) routing fix
    # -------------------------------------------------------
    # React Router use karta hai client-side routing
    # Agar user directly /dashboard pe jaaye, nginx ko
    # "file nahi mili" error nahi deni chahiye
    # Har route ke liye index.html serve karo — React handle karega
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------
    # Static Assets — Aggressive caching
    # -------------------------------------------------------
    # JS, CSS, images ke liye 1 saal cache
    # Kyun? Vite build mein files ka naam hash se hota hai
    # Example: main.a3f9d2.js — naam change = new file
    # Toh purani cached files kabhi conflict nahi karengi
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # -------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------
    # Response ko compress karke bhejo — bandwidth save hoti hai
    # 100KB file → 30KB compressed (70% savings!)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
