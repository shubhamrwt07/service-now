services:
  backend:
    build: ./backend
    container_name: service-now-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: service-now-frontend
    ports:
      - "3005:3005"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: service-now-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: servicenow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: